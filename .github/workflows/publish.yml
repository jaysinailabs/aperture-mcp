name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') && !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aperture-mcp
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Verify stable tag matches package version
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Refusing to publish non-stable tag: {tag}")

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          expected = tag.removeprefix("v")
          if version != expected:
              raise SystemExit(
                  f"pyproject.toml version {version!r} does not match tag {tag!r}"
              )
          PY

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Validate built wheel before publish
        run: |
          python -m venv .tmp_publish_wheel
          .tmp_publish_wheel/bin/python -m pip install --upgrade pip
          .tmp_publish_wheel/bin/python -m pip install dist/*.whl
          version="$(
            .tmp_publish_wheel/bin/aperture-mcp --version
          )"
          test "$version" = "aperture-mcp 0.1.0"
          .tmp_publish_wheel/bin/python - <<'PY'
          from aperture import Anchor, AnchorKind, compare

          r = compare(
              "we keep ci-gates-green in CI",
              "we keep things in CI",
              anchors=[Anchor(AnchorKind.COMMITMENT, "ci-gates-green")],
          )
          assert "DROPPED_SILENTLY" in str(r.status), f"expected DROPPED_SILENTLY, got {r.status!r}"
          assert r.anchor_violations, r
          print("wheel smoke OK", r.status)
          PY

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  registry:
    name: Publish to MCP Registry
    needs: pypi
    if: ${{ startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') && !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify stable tag matches server.json version
        run: |
          python3 - <<'PY'
          import json
          import os

          tag = os.environ["GITHUB_REF_NAME"]

          with open("server.json", "rb") as handle:
              version = json.load(handle)["version"]

          expected = f"v{version}"
          if expected != tag:
              raise SystemExit(
                  f"server.json version {version!r} does not match tag {tag!r}"
              )
          PY

      - name: Install mcp-publisher
        run: |
          curl -sSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar -xz mcp-publisher

      - name: Publish server.json to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
