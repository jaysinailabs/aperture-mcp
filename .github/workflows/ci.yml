name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest build ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Smoke tests
        run: pytest tests/ -q
      - name: Conformance suite (frozen v0.2 contract)
        run: python conformance/runner.py
      - name: Runnable example (offline, checked-in fixtures)
        run: python examples/git_decision_drift/git_decision_drift.py
      - name: Build wheel + sdist
        run: python -m build
